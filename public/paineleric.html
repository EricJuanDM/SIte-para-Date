<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Secreto do Eric 🔒</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #2b1616;
            background-image: url('imagens/f58.gif'); 
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #5c3a3a;
        }

        .container {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 440px;
            height: 520px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .panel-step {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .panel-step.active { display: flex; }

        h2 { font-weight: 700; color: #4a1c1c; margin-top: 0; font-size: 24px; margin-bottom: 10px; }
        p { font-size: 14px; margin-bottom: 20px; color: #666; }

        input {
            font-family: 'Poppins', sans-serif;
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid #ddd;
            width: 100%;
            box-sizing: border-box;
            font-size: 14px;
            text-align: center;
        }

        button {
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 600;
            background-color: #4a1c1c;
            color: white;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            height: 45px;
        }
        button:hover { background-color: #612727; }

        #datesList {
            width: 100%;
            max-height: 360px;
            overflow-y: auto;
            padding-right: 5px;
            text-align: left;
        }

        .date-card {
            background: #faf5f5;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            text-align: left;
            margin-top: 12px;
            border-left: 5px solid #ffb6c1;
            box-sizing: border-box;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            position: relative;
        }

        .btn-delete {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #cc0000;
            font-size: 16px;
            cursor: pointer;
            width: auto;
            height: auto;
            margin: 0;
            padding: 5px;
            box-shadow: none;
        }
        .btn-delete:hover {
            color: #ff0000;
            transform: scale(1.1);
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCCquHW_OM6SPzex2Yef6Veqp5OOnAXnj4",
            authDomain: "date-perfeito-5925e.firebaseapp.com",
            projectId: "date-perfeito-5925e",
            storageBucket: "date-perfeito-5925e.firebasestorage.app",
            messagingSenderId: "958617736891",
            appId: "1:958617736891:web:d45e2a7f8b9b94b4ccfb9e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Amarrando a função no escopo global da janela de forma explícita
        window.tentarLogin = function() {
            const senhaInput = document.getElementById('adminPassword').value;
            if(senhaInput === "1234") { 
                document.getElementById('stepLogin').classList.remove('active');
                document.getElementById('stepAdmin').classList.add('active');
                window.carregarDates(); // Chama a função de carregar dados
            } else {
                alert("Senha incorreta, Eric! ⛔");
            }
        };

        window.carregarDates = async function() {
            const datesList = document.getElementById('datesList');
            datesList.innerHTML = '<p style="color: #888; text-align:center; font-size:13px;">Buscando respostas na nuvem...</p>';
            try {
                // Busca na coleção "datesMarcados" ordenando por data de criação
                const q = query(collection(db, "datesMarcados"), orderBy("criadoEm", "desc"));
                const querySnapshot = await getDocs(q);
                
                if(querySnapshot.empty) {
                    datesList.innerHTML = '<p style="color: #888; text-align:center; font-size:13px;">Nenhum date marcado ainda. Aguardando ela responder! ⏳</p>';
                    return;
                }
                datesList.innerHTML = '';
                querySnapshot.forEach((documento) => {
                    const d = documento.data();
                    const id = documento.id;
                    
                    datesList.innerHTML += `
                        <div class="date-card" id="card-${id}">
                            <button class="btn-delete" onclick="window.apagarDate('${id}')" title="Apagar">🗑️</button>
                            <strong>📅 Data escolhida:</strong> ${d.data || 'Não definida'}<br>
                            <strong>⏰ Horário:</strong> ${d.hora || 'Não definido'}h<br>
                            <strong>🍕 Cardápio:</strong> ${d.comida || 'Não definido'}
                        </div>
                    `;
                });
            } catch(e) {
                console.error("Erro ao ler dados: ", e);
                datesList.innerHTML = '<p style="color: #cc0000; text-align:center; font-size:13px;">Erro na conexão com o Firestore. Verifique se as Regras estão públicas.</p>';
            }
        };

        window.apagarDate = async function(id) {
            if(confirm("Tem certeza que quer apagar este registro de teste? 🤔")) {
                try {
                    await deleteDoc(doc(db, "datesMarcados", id));
                    const card = document.getElementById(`card-${id}`);
                    if(card) card.remove();
                    
                    const datesList = document.getElementById('datesList');
                    if(datesList.children.length === 0) {
                        datesList.innerHTML = '<p style="color: #888; text-align:center; font-size:13px;">Nenhum date marcado ainda. Aguardando ela responder! ⏳</p>';
                    }
                } catch (error) {
                    console.error("Erro ao deletar: ", error);
                    alert("Não foi possível apagar do banco.");
                }
            }
        };
    </script>
</head>
<body>

    <div class="container">
        
        <div id="stepLogin" class="panel-step active">
            <h2>Painel Admin 🔒</h2>
            <p>Acesso restrito para visualização de respostas</p>
            <input type="password" id="adminPassword" placeholder="Sua senha de acesso" onkeydown="if(event.key === 'Enter') window.tentarLogin()">
            <button onclick="window.tentarLogin()">Acessar Banco</button>
        </div>

        <div id="stepAdmin" class="panel-step">
            <h2>📅 Respostas Recebidas</h2>
            <div id="datesList"></div>
        </div>

    </div>

</body>
</html>
