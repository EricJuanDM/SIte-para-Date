<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DatePerfeito - Faça seu Login 🌸</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>DatePerfeito 🌸</h1>
        <p>Crie convites personalizados e surpreenda quem você ama.</p>
        
        <div class="auth-tabs">
            <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Entrar</button>
            <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Cadastrar</button>
        </div>

        <!-- Formulário de Login -->
        <form id="loginForm" class="step active" onsubmit="return false;">
            <input type="email" id="loginEmail" placeholder="Seu email" required autocomplete="email">
            <input type="password" id="loginPassword" placeholder="Sua senha" required autocomplete="current-password">
            <button type="submit" class="btn-primary" style="width: 100%;">Entrar ♥</button>
        </form>

        <!-- Formulário de Cadastro -->
        <form id="registerForm" class="step" onsubmit="return false;">
            <input type="text" id="registerName" placeholder="Seu nome" required autocomplete="name">
            <input type="email" id="registerEmail" placeholder="Seu email" required autocomplete="email">
            <input type="password" id="registerPassword" placeholder="Escolha uma senha" required autocomplete="new-password">
            <button type="submit" class="btn-primary" style="width: 100%;">Criar Conta ♥</button>
        </form>

        <!-- Divisor -->
        <div style="margin: 20px 0 10px; width: 100%; border-top: 1px solid rgba(74, 40, 44, 0.1); position: relative;">
            <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #fdfafb; padding: 0 10px; font-size: 11px; color: var(--color-text-light);">ou</span>
        </div>

        <button type="button" id="btnGoogle" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="Google Logo">
            Entrar com o Google
        </button>
    </div>

    <!-- Script de Autenticação -->
    <script type="module" src="js/auth.js"></script>
    <script>
        window.switchTab = function(type) {
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            const formLogin = document.getElementById('loginForm');
            const formRegister = document.getElementById('registerForm');

            if (type === 'login') {
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                formLogin.classList.add('active');
                formRegister.classList.remove('active');
            } else {
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
                formRegister.classList.add('active');
                formLogin.classList.remove('active');
            }
        }
    </script>
</body>
</html>
